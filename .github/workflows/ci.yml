name: CI

# Pre-merge gate: build + tests must pass before a PR can merge.
on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

jobs:
  core:
    name: Build core + CLI + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # "8 bis 10": provision all three SDKs; global.json pins 9.0.100 and rolls forward to the newest.
      - name: Setup .NET (8, 9, 10)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      # On a Linux host the shared libs build as plain net10.0 (no Android/Windows flavors), and the
      # CLI compiles its real BlueZ transport (LINUX auto-defined) — no mobile workload needed.
      - name: Build CLI
        run: dotnet build Source/Trackify.Cli/Trackify.Cli.csproj -c Release

      - name: Test
        run: dotnet test Test/Trackify.Tests/Trackify.Tests.csproj -c Release

# NOTE: the Uno app (Source/Trackify) is intentionally NOT built here. Its project declares five heads
# (android, ios, browserwasm, desktop, windows); restoring it on any single runner triggers workload
# imports (android/wasm-tools) and OS-locked TFMs (ios needs macOS, windows needs Windows), even with
# `-f <head>`. Gating one head reliably would need a per-OS + workload matrix. The Android head is
# built by android-apk.yml; the other heads are verified by developers locally.
